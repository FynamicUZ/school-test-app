<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--tg-theme-bg-color); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;">
        <h2>Ustozlar uchun kirish</h2>
        <p>Iltimos, parolni kiriting:</p>
        <input type="password" id="admin-pass" style="width: 80%; padding: 10px; margin: 20px 0; border-radius: 8px; border: 1px solid var(--tg-theme-hint-color); background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color);">
        <button class="btn" onclick="checkAuth()">Kirish</button>
    </div>

    <div id="app" style="display: none;">
        <h1 id="title">O'qituvchi boshqaruvi</h1>
        
        <!-- Tab Navigation -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('create')">Test yaratish</button>
            <button class="tab-btn" onclick="showTab('results')">Natijalar</button>
        </div>

        <!-- Create Test Tab -->
        <div id="create-tab" class="tab-content">
            <div class="form-group">
                <label>Test nomi</label>
                <input type="text" id="test-title" placeholder="Masalan: Tarix 1-test">
            </div>
            <div class="form-group">
                <label>Savollar soni</label>
                <input type="number" id="num-questions" placeholder="Masalan: 10" min="1">
            </div>
            <div class="form-group">
                <label>Javoblar kaliti (vergul bilan)</label>
                <input type="text" id="answer-key" placeholder="A,B,C,D...">
            </div>
            <div class="form-group">
                <label>Boshlanish vaqti</label>
                <input type="datetime-local" id="start-time">
            </div>
            <div class="form-group">
                <label>Tugash vaqti</label>
                <input type="datetime-local" id="end-time">
            </div>
            <button class="btn" onclick="createTest()">Yaratish va Tarqatish</button>
        </div>

        <!-- Results Tab -->
        <div id="results-tab" class="tab-content" style="display: none;">
            <div id="results-list">
                <p>Natijalarni ko'rish uchun testni tanlang</p>
                <div id="tests-list-container"></div>
            </div>
            <div id="analysis-view" style="display: none;">
                <button class="btn-sec" onclick="backToResults()">← Ortga</button>
                <h3>Rasch tahlili va natijalar</h3>
                <div id="rasch-results"></div>
            </div>
        </div>
    </div>
    <script src="teacher.js"></script>
</body>
</html>
